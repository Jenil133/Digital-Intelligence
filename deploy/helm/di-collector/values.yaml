image:
  repository: ghcr.io/example/di-collector
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 8080

resources:
  requests: { cpu: "250m", memory: "256Mi" }
  limits:   { cpu: "1",    memory: "512Mi" }

env:
  REDIS_URL: "redis://redis-master.default.svc:6379/0"
  LISTEN_ADDR: ":8080"
  ENV: "prod"

# Loaded as Secret keys.
secrets:
  TENANT_TOKENS: ""

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercentage: 70

podMonitor:
  enabled: true
